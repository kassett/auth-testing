helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true

repositories:
  - name: goauthentik
    url: https://charts.goauthentik.io

releases:
  - name: postgres
    namespace: postgres
    chart: oci://registry-1.docker.io/cloudpirates/postgres
    values:
      - architecture: standalone
        replicaCount: 1
        auth:
          username: authentik
          password: authentik
          database: authentik

  - name: authentik
    namespace: authentik
    chart: goauthentik/authentik
    needs:
      - postgres/postgres
    values:
      - authentik:
          secret_key: dev-authentik-secret-key-change-me-1234567890
          postgresql:
            host: postgres.postgres.svc.cluster.local
            name: authentik
            user: authentik
            password: authentik

  - name: raw
    namespace: authentik
    needs:
      - authentik/authentik
    chart: bedag/raw
    version: 2.0.0
    disableValidation: true
    disableValidationOnInstall: true
    disableOpenAPIValidation: true
    values:
      - resources:
          - apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: authentik
              namespace: authentik
            spec:
              parentRefs:
                - name: edge
                  namespace: envoy-gateway-system
              hostnames:
                - authentik.autheval.test
              rules:
                - matches:
                    - path:
                        type: PathPrefix
                        value: /
                  backendRefs:
                    - name: authentik-server
                      port: 80
